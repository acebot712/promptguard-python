name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install ruff==0.15.4

      - name: Check linting
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov --cov-report=term-missing --cov-fail-under=50

  validate-api-contract:
    name: Validate API Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download OpenAPI spec
        id: download-spec
        continue-on-error: true
        env:
          SPEC_TOKEN: ${{ secrets.OPENAPI_SPEC_TOKEN }}
        run: |
          if [ -z "$SPEC_TOKEN" ]; then
            echo "OPENAPI_SPEC_TOKEN not set, skipping validation"
            exit 1
          fi
          curl -sfL \
            -H "Authorization: token $SPEC_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/acebot712/promptguard/contents/apps/docs/api-reference/openapi-developer.json?ref=main" \
            -o openapi-developer.json

      - name: Validate SDK types against spec
        if: steps.download-spec.outcome == 'success'
        run: python tests/validate_openapi.py openapi-developer.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "import promptguard; print('OK')"
