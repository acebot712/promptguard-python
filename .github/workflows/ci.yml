name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install ruff==0.15.4

      - name: Check linting
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov --cov-report=term-missing --cov-fail-under=50

  validate-api-contract:
    name: Validate API Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download OpenAPI spec
        run: |
          curl -sL https://raw.githubusercontent.com/acebot712/promptguard/main/apps/docs/api-reference/openapi-developer.json \
            -o openapi-developer.json

      - name: Validate SDK types against spec
        run: python tests/validate_openapi.py openapi-developer.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, validate-api-contract]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "import promptguard; print('OK')"
