name: Release to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

# Default to read-only. id-token: write is escalated only on the
# publish job that actually needs PyPI Trusted Publishing OIDC.
permissions:
  contents: read

# Only one publish at a time -- never two concurrent publishes of
# the same version. Don't cancel in progress: a half-rolled-back
# publish is worse than two queued.
concurrency:
  group: release-pypi
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Lint
        run: |
          pip install ruff==0.15.4
          ruff check .
          ruff format --check .

      - name: Test
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v

      - name: Build
        run: |
          pip install build
          python -m build

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    # PyPI Trusted Publishing needs id-token: write to mint the OIDC
    # token. contents: read is for checkout. Nothing else escalates.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Get version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version exists on PyPI
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if pip index versions promptguard-sdk 2>/dev/null | grep -q "$VERSION"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: |
          pip install build
          python -m build

      - name: Publish (Trusted Publishing)
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
