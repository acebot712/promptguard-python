name: Release to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

# Default to read-only. id-token: write is escalated only on the
# publish job that actually needs PyPI Trusted Publishing OIDC.
permissions:
  contents: read

# Only one publish at a time -- never two concurrent publishes of
# the same version. Don't cancel in progress: a half-rolled-back
# publish is worse than two queued.
concurrency:
  group: release-pypi
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Lint
        run: |
          pip install ruff==0.15.20
          ruff check .
          ruff format --check .

      - name: Test
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v

      - name: Build
        run: |
          pip install build
          python -m build

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    # PyPI Trusted Publishing needs id-token: write to mint the OIDC
    # token. contents: read is for checkout. Nothing else escalates.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Get version
        id: version
        run: |
          # Version is single-sourced in promptguard/_version.py (hatch reads
          # it via [tool.hatch.version]); pyproject no longer carries it.
          # Parse the file directly so we don't import the package (and its
          # httpx dependency, which isn't installed in this job).
          VERSION=$(python -c "import re, pathlib; print(re.search(r'__version__\s*=\s*[\"\x27]([^\"\x27]+)', pathlib.Path('promptguard/_version.py').read_text()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on PyPI
        id: check
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          # `pip index` (experimental) prints a single "Available versions: a, b, c"
          # line. Parse it into one version per line and match the exact token,
          # so e.g. 1.9.0 never matches 1.9.01 or 11.9.0. Fail loudly if the
          # command itself errors rather than silently treating that as "new".
          if ! AVAILABLE=$(pip index versions promptguard-sdk 2>/dev/null); then
            echo "pip index versions failed" >&2
            exit 1
          fi
          if printf '%s\n' "$AVAILABLE" \
            | sed -n 's/.*Available versions: //p' \
            | tr ',' '\n' \
            | tr -d '[:space:]' \
            | grep -qx -- "$VERSION"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: |
          pip install build
          python -m build

      - name: Publish (Trusted Publishing)
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
